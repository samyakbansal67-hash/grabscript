}

function FloatingChips() {

/* ── Transcript card ── */
function TranscriptCard({ phase,setPhase,url,setUrl,results,setResults,anchorRef }) {
  const inputRef = useRef(null);
  const [focused, setFocused] = useState(false);
  const [pasted,  setPasted]  = useState(false);
  const [timestamps, setTs]   = useState(true);
  const [error,   setError]   = useState('');
  const btnRef = useRef(null);

  const ripple = (e) => {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const span = document.createElement('span');
    const size = Math.max(rect.width, rect.height);
    span.style.cssText = `position:absolute;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;width:${size}px;height:${size}px;background:rgba(255,255,255,0.35);border-radius:999px;transform:scale(0);transition:transform 700ms ease,opacity 700ms ease;pointer-events:none;`;
    btn.appendChild(span);
    requestAnimationFrame(()=>{ span.style.transform='scale(2.2)'; span.style.opacity='0'; });
    setTimeout(()=>span.remove(), 800);
  };

  const onPaste = async () => {
    try { const t = await navigator.clipboard.readText(); if(t) setUrl(t); }
    catch { setUrl('https://youtu.be/dQw4w9WgXcQ'); }
    setPasted(true); setTimeout(()=>setPasted(false), 1200);
    inputRef.current?.focus();
  };

  const generate = async (e) => {
    ripple(e);
    setError('');
    const trimmed = url.trim();
    if (!trimmed) { setError('Please paste a YouTube URL first.'); return; }
    setPhase('loading');
    try {
      const res = await fetch('/api/transcript', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: trimmed, timestamps }),
      });
      const json = await res.json();
      if (!res.ok || json.error) {
        setError(json.error || 'Something went wrong. Please try again.');
        setPhase('idle');
        return;
      }
      setResults({ data: json.transcript, meta: json.meta, when: Date.now() });
      setPhase('done');
    } catch(err) {
      setError('Network error — is the server running? (npm start)');
      setPhase('idle');
    }
  };

  return (
    <section id="transcript-card" ref={anchorRef} className="relative px-6 -mt-2">
      <motion.div initial={{opacity:0,y:40,scale:0.96}} whileInView={{opacity:1,y:0,scale:1}}
        viewport={{once:true,amount:0.3}} transition={{duration:1,ease:[0.22,1,0.36,1]}}
        className="max-w-[920px] mx-auto">
        <motion.div animate={{y:[0,-6,0]}} transition={{duration:6,repeat:Infinity,ease:'easeInOut'}}
          className="anim-border-frame p-1.5 shadow-[0_40px_80px_-30px_rgba(60,40,120,0.35)]">
          <div className="relative rounded-[24px] bg-white/90 backdrop-blur p-6 md:p-9 overflow-hidden">
            <Corners />

            {/* window chrome */}
            <div className="flex items-center justify-between text-xs text-ink-500">
              <div className="flex items-center gap-1.5">
                <span className="h-2 w-2 rounded-full bg-rose-300" />
                <span className="h-2 w-2 rounded-full bg-amber-300" />
                <span className="h-2 w-2 rounded-full bg-emerald-300" />
                <span className="ml-2 font-mono tracking-wider">grabscript / new transcript</span>
              </div>
              <span className="font-mono opacity-70 hidden sm:inline">⌘ + ⏎ to generate</span>
            </div>

            {/* URL input */}
            <div className="mt-6">
              <label className="block text-[13px] text-ink-500 mb-2 font-medium">Paste a YouTube link</label>
              <motion.div
                animate={focused ? { boxShadow:'0 0 0 6px rgba(123,108,242,0.12), 0 20px 50px -20px rgba(80,60,180,0.35)' } : { boxShadow:'0 1px 0 rgba(0,0,0,0.04)' }}
                transition={{duration:0.4}}
                className="relative rounded-2xl bg-cream border border-paper px-4 py-3.5 flex items-center gap-3">
                <IconLink size={18} className="text-ink-300 shrink-0" />
                <input ref={inputRef} value={url} onChange={e=>setUrl(e.target.value)}
                  onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
                  onKeyDown={e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter') btnRef.current?.click(); }}
                  placeholder="youtube.com/watch?v=..."
                  className="flex-1 min-w-0 bg-transparent outline-none text-[15px] placeholder:text-ink-300" />
                <AnimatePresence>
                  {url && (
                    <motion.button initial={{opacity:0,scale:0.6}} animate={{opacity:1,scale:1}} exit={{opacity:0,scale:0.6}}
                      onClick={()=>{setUrl('');setError('');}} className="text-ink-300 hover:text-ink-700" aria-label="Clear">
                      <IconX size={16} />
                    </motion.button>
                  )}
                </AnimatePresence>
                <motion.button whileHover={{y:-1}} whileTap={{scale:0.96}} onClick={onPaste}
                  className="text-xs font-medium px-3 py-1.5 rounded-full bg-white border border-paper text-ink-700 flex items-center gap-1.5">
                  <AnimatePresence mode="wait">
                    {pasted
                      ? <motion.span key="ok" initial={{opacity:0,y:4}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-4}} className="flex items-center gap-1"><IconCheck size={12} stroke={3}/> pasted</motion.span>
                      : <motion.span key="p"  initial={{opacity:0,y:4}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-4}} className="flex items-center gap-1"><IconPaste size={12} stroke={2}/> paste</motion.span>}
                  </AnimatePresence>
                </motion.button>
              </motion.div>
            </div>

            {/* options row */}
            <div className="mt-4 flex flex-wrap gap-2 text-xs">
              {/* timestamp toggle */}
              <motion.button onClick={()=>setTs(!timestamps)} whileTap={{scale:0.95}}
                animate={{ backgroundColor:timestamps?'#1a1530':'#ffffff', color:timestamps?'#fbf8f4':'#5a527e', borderColor:timestamps?'#1a1530':'#f0e9df' }}
                transition={{duration:0.25}} className="rounded-full border px-3 py-1.5 flex items-center gap-1.5 font-medium">
                <motion.span animate={{scale:timestamps?1:0,opacity:timestamps?1:0}} transition={{duration:0.2}} className="inline-block">
                  <IconCheck size={11} stroke={3} />
                </motion.span>
                with timestamps
              </motion.button>

              {/* auto-detect badge */}
              <div className="rounded-full border border-paper px-3 py-1.5 flex items-center gap-1.5 font-medium text-ink-300 bg-white/60 select-none">
                <IconGlobe size={11} stroke={2} />
                auto language
              </div>
            </div>

            {/* error banner */}
            <AnimatePresence>
              {error && (
                <motion.div initial={{opacity:0,y:-6,height:0}} animate={{opacity:1,y:0,height:'auto'}} exit={{opacity:0,y:-6,height:0}}
                  transition={{duration:0.3}} className="mt-4 overflow-hidden">
                  <div className="flex items-start gap-2.5 rounded-xl bg-rose-50 border border-rose-200 px-4 py-3 text-[13px] text-rose-700">
                    <IconAlert size={15} stroke={2} className="shrink-0 mt-0.5" />
                    <span>{error}</span>
                  </div>
                </motion.div>
              )}
            </AnimatePresence>

            {/* generate button */}
            <motion.button ref={btnRef} onClick={generate} disabled={phase==='loading'}
              whileHover={phase!=='loading'?{y:-2}:{}} whileTap={phase!=='loading'?{scale:0.98}:{}}
              className="relative overflow-hidden shine mt-7 w-full rounded-2xl bg-gradient-to-r from-indigo-soft via-violet-soft to-blush text-white py-4 font-medium text-[15px] flex items-center justify-center gap-2 shadow-[0_22px_44px_-18px_rgba(123,108,242,0.65)] disabled:opacity-70">
              <AnimatePresence mode="wait">
                {phase==='loading'
                  ? <motion.span key="l" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="flex items-center gap-2">
                      <Spinner /> Fetching transcript…
                    </motion.span>
                  : <motion.span key="g" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="flex items-center gap-2 relative z-10">
                      <IconSpark size={16} stroke={2.4} /> Generate transcript
                    </motion.span>}
              </AnimatePresence>
            </motion.button>

            <p className="mt-4 text-center text-[12px] text-ink-300">No login required · no signup · free forever</p>

            <AnimatePresence mode="wait">
              {phase==='loading' && <LoadingPanel key="ld" />}
              {phase==='done' && results && <TranscriptOutput key="out" data={results.data} meta={results.meta} showTimestamps={timestamps} />}
            </AnimatePresence>
          </div>
        </motion.div>

        <BelowCardChips />
      </motion.div>
    </section>
  );
}

function Corners() {
  const C = ({pos}) => (
    <div className={`absolute ${pos} text-ink-300 opacity-50`}>
      <svg width="14" height="14" viewBox="0 0 14 14" stroke="currentColor" strokeWidth="1.2" fill="none">
        <path d="M7 0v14M0 7h14" />
      </svg>
    </div>
  );
  return <><C pos="top-3 left-3"/><C pos="top-3 right-3"/><C pos="bottom-3 left-3"/><C pos="bottom-3 right-3"/></>;
}

function Spinner() {
  return <span className="inline-block h-4 w-4 rounded-full border-2 border-white/40 border-t-white animate-spin" />;
}

function BelowCardChips() {
  return (
    <div className="mt-6 flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-xs text-ink-500">
      {[['✶','no login'],['◐','no watermark'],['✦','auto language'],['◇','export anywhere']].map(([s,t],i)=>(
        <motion.div key={i} initial={{opacity:0,y:10}} whileInView={{opacity:1,y:0}} viewport={{once:true}}
          transition={{delay:0.1*i,duration:0.6}} className="flex items-center gap-1.5">
          <span className="text-blush">{s}</span> {t}
        </motion.div>
      ))}
    </div>
  );
}

Object.assign(window, { AnimatedBackdrop, TopNav, Hero, StaggerLine, FloatingChips, TranscriptCard, Corners, Spinner, BelowCardChips });
</script>

<!-- ── Loading + Output + Features + Footer ── -->
<script type="text/babel">
const { motion: m2, AnimatePresence: AP2 } = window.Motion;
const { useState: useS2, useEffect: useE2, useRef: useR2, useMemo: useM2 } = React;

/* Loading panel */
function LoadingPanel() {
  const phrases = ['Connecting to server','Fetching caption track','Parsing timestamps','Cleaning text','Almost there…'];
  const [idx, setIdx] = useS2(0);
  useE2(() => {
    const id = setInterval(()=>setIdx(i=>(i+1)%phrases.length), 700);
    return ()=>clearInterval(id);
  }, []);
  return (
    <m2.div initial={{opacity:0,height:0,marginTop:0}} animate={{opacity:1,height:'auto',marginTop:28}}
      exit={{opacity:0,height:0,marginTop:0}} transition={{duration:0.5,ease:[0.22,1,0.36,1]}} className="overflow-hidden">
      <div className="rounded-2xl bg-paper/70 p-5 border border-paper">
        <div className="flex items-center justify-between gap-4">
          <div className="flex items-center gap-3 min-w-0">
            <div className="grid place-items-center h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-soft to-violet-soft text-white">
              <IconSpark size={16} stroke={2.4} />
            </div>
            <div className="min-w-0">
              <div className="text-[13px] text-ink-700 font-medium">
                <AP2 mode="wait">
                  <m2.span key={idx} initial={{y:10,opacity:0}} animate={{y:0,opacity:1}} exit={{y:-10,opacity:0}} transition={{duration:0.35}} className="inline-block">
                    {phrases[idx]}
                  </m2.span>
                </AP2>
                <span className="cursor-blink ml-1">▍</span>
              </div>
              <div className="text-[11px] text-ink-300 mt-0.5 font-mono">grabscript · fetching captions</div>
            </div>
          </div>
          <Waveform />
        </div>
        <div className="mt-5 h-1 rounded-full bg-paper overflow-hidden">
          <m2.div initial={{width:'0%'}} animate={{width:'100%'}} transition={{duration:8,ease:[0.4,0,0.2,1]}}
            className="h-full bg-gradient-to-r from-indigo-soft via-violet-soft to-blush" />
        </div>
        <div className="mt-6 space-y-3">
          {[100,92,78,96,70].map((w,i)=>(
            <m2.div key={i} initial={{opacity:0,x:-8}} animate={{opacity:1,x:0}} transition={{delay:0.1+i*0.07}} className="flex items-start gap-3">
              <div className="shimmer h-3 w-12 rounded-md mt-1.5 shrink-0" />
              <div className="flex-1 space-y-1.5">
                <div className="shimmer h-3 rounded-md" style={{width:w+'%'}} />
                <div className="shimmer h-3 rounded-md" style={{width:(w-14)+'%'}} />
              </div>
            </m2.div>
          ))}
        </div>
      </div>
    </m2.div>
  );
}

function Waveform() {
  return (
    <div className="flex items-end gap-[3px] h-9">
      {Array.from({length:18}).map((_,i)=>(
        <m2.span key={i} className="block w-[3px] rounded-full bg-gradient-to-t from-indigo-soft to-blush"
          style={{transformOrigin:'bottom',height:'100%'}}
          animate={{scaleY:[0.2,0.95,0.4,1,0.3]}}
          transition={{duration:1.1+(i%5)*0.1,repeat:Infinity,ease:'easeInOut',delay:i*0.05}} />
      ))}
    </div>
  );
}

/* Transcript output */
function TranscriptOutput({ data, meta, showTimestamps }) {
  const [query,  setQuery]  = useS2('');
  const [copied, setCopied] = useS2(false);
  const [thumbErr, setThumbErr] = useS2(false);

  const wordCount = useM2(()=>data.reduce((n,b)=>n+b.text.split(/\s+/).length,0),[data]);
  const filtered  = useM2(()=>{
    if (!query.trim()) return data;
    const q = query.toLowerCase();
    return data.filter(b=>b.text.toLowerCase().includes(q));
  },[query,data]);

  const buildText = () => showTimestamps
    ? data.map(b=>`[${b.t}] ${b.text}`).join('\n\n')
    : data.map(b=>b.text).join('\n\n');

  const onCopy = () => {
    const txt = buildText();
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(txt).catch(fallback);
    } else { fallback(); }
    setCopied(true); setTimeout(()=>setCopied(false), 1600);
  };

  const onDownload = () => {
    const txt = buildText();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
    a.download = `transcript-${meta?.videoId||'video'}.txt`;
    a.click();
  };

  const title    = meta?.title    || 'YouTube Video';
  const channel  = meta?.channel  || '';
  const views    = meta?.views    || '';
  const duration = meta?.duration || '';
  const langLabel= meta?.detectedLanguage || 'auto-detected';
  const thumbUrl = meta?.videoId && !thumbErr
    ? `https://img.youtube.com/vi/${meta.videoId}/hqdefault.jpg`
    : null;

  return (
    <m2.div initial={{opacity:0,height:0,marginTop:0}} animate={{opacity:1,height:'auto',marginTop:28}}
      exit={{opacity:0,height:0}} transition={{duration:0.7,ease:[0.22,1,0.36,1]}} className="overflow-hidden">
      <div className="rounded-2xl bg-cream/60 border border-paper">
        {/* thumbnail */}
        {thumbUrl && (
          <m2.div initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} transition={{duration:0.6,ease:[0.22,1,0.36,1]}}
            className="relative w-full overflow-hidden rounded-t-2xl" style={{aspectRatio:'16/9',maxHeight:'220px'}}>
            <img src={thumbUrl} onError={()=>setThumbErr(true)} alt={title}
              className="w-full h-full object-cover" style={{objectPosition:'center'}} />
            <div className="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent pointer-events-none" />
          </m2.div>
        )}
        {/* header */}
        <div className="px-5 pt-5 pb-3 flex flex-wrap gap-4 items-start justify-between">
          <div className="min-w-0 flex-1">
            <div className="text-[11px] uppercase tracking-[0.18em] text-ink-300">Source</div>
            <div className="font-display text-[20px] leading-tight mt-1 max-w-[480px] line-clamp-2">{title}</div>
            <div className="mt-1.5 flex flex-wrap items-center gap-2 text-[12px] text-ink-500">
              {channel && <><span className="font-medium">{channel}</span><span>·</span></>}
              {views   && <><span>{views}</span><span>·</span></>}
              {duration&& <><span>{duration}</span><span>·</span></>}
              <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-white/80 border border-paper font-medium text-ink-700">{langLabel}</span>
            </div>
          </div>
          <div className="flex flex-wrap gap-2 shrink-0">
            <Stat icon={<IconType size={12}/>}  label={`${wordCount.toLocaleString()} words`} />
            {duration && <Stat icon={<IconClock size={12}/>} label={duration} />}
            <Stat icon={<IconHash size={12}/>}  label={`${data.length} segments`} />
          </div>
        </div>

        {/* toolbar */}
        <div className="px-5 pb-3 flex flex-wrap items-center gap-2">
          <div className="flex-1 min-w-[200px] flex items-center gap-2 bg-white border border-paper rounded-full px-3.5 py-2">
            <IconSearch size={14} className="text-ink-300" />
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search inside transcript…"
              className="bg-transparent outline-none text-sm flex-1 placeholder:text-ink-300" />
            {query && <span className="text-[11px] text-ink-300 font-mono">{filtered.length} match{filtered.length===1?'':'es'}</span>}
          </div>
          <ActionBtn onClick={onCopy}     icon={copied?<IconCheck size={14} stroke={3}/>:<IconCopy size={14}/>}     label={copied?'Copied':'Copy'} hot={copied} />
          <ActionBtn onClick={onDownload} icon={<IconDownload size={14}/>}                                           label=".txt" />
        </div>

        {/* transcript scroller */}
        <div className="relative max-h-[440px] overflow-y-auto px-5 pb-5">
          <div key={query} className="space-y-2">
            <AP2>
              {filtered.map((b,i)=>(
                <m2.div key={b.t+'-'+i} initial={{opacity:0,y:8}} animate={{opacity:1,y:0}}
                  transition={{duration:0.5,delay:Math.min(i,20)*0.025,ease:[0.22,1,0.36,1]}}
                  whileHover={{x:4}} className="group flex gap-3 p-3 rounded-xl hover:bg-white/70 transition-colors cursor-pointer">
                  {showTimestamps && (
                    <div className="shrink-0">
                      <div className="font-mono text-[11px] text-ink-300 group-hover:text-ink-700 transition-colors bg-paper/60 group-hover:bg-cream rounded-md px-2 py-1">
                        {b.t}
                      </div>
                    </div>
                  )}
                  <p className="text-[15px] leading-[1.55] text-ink-700"><Highlight text={b.text} q={query}/></p>
                </m2.div>
              ))}
            </AP2>
            {filtered.length===0 && (
              <m2.div initial={{opacity:0}} animate={{opacity:1}} className="text-center py-8 text-ink-300 text-sm">
                <span className="font-display italic text-[18px]">nothing found.</span><br/>try a different query.
              </m2.div>
            )}
          </div>
          <div className="pointer-events-none absolute left-0 right-0 top-0 h-8 bg-gradient-to-b from-cream/80 to-transparent" />
          <div className="pointer-events-none absolute left-0 right-0 bottom-0 h-8 bg-gradient-to-t from-cream/80 to-transparent" />
        </div>
      </div>
    </m2.div>
  );
}

function Stat({icon,label}) {
  return (
    <div className="inline-flex items-center gap-1.5 rounded-full bg-white/80 border border-paper px-2.5 py-1 text-[12px] text-ink-700 font-medium">
      <span className="text-ink-300">{icon}</span>{label}
    </div>
  );
}
function ActionBtn({icon,label,onClick,hot}) {
  return (
    <m2.button onClick={onClick} whileHover={{y:-1}} whileTap={{scale:0.95}}
      animate={hot?{backgroundColor:'#1a1530',color:'#fbf8f4'}:{backgroundColor:'#ffffff',color:'#1a1530'}}
      transition={{duration:0.25}} className="rounded-full border border-paper px-3.5 py-2 text-sm font-medium flex items-center gap-1.5">
      {icon} {label}
    </m2.button>
  );
}
function Highlight({text,q}) {
  if (!q.trim()) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.split(re).map((p,i)=>
    re.test(p) ? <mark key={i} className="bg-gradient-to-r from-amber-200 to-blush/80 text-ink-900 rounded px-0.5">{p}</mark> : <span key={i}>{p}</span>
  );
}

/* Ticker */
function Ticker() {
  const items = [...window.TICKER,...window.TICKER];
  return (
    <section className="py-10 overflow-hidden">
      <div className="flex gap-12 marquee-track whitespace-nowrap">
        {items.map((it,i)=>(
          <div key={i} className="flex items-center gap-12 text-ink-500">
            <span className="font-display italic text-[28px] md:text-[36px]">{it}</span>
            <span className="text-blush text-2xl">✶</span>
          </div>

<!-- ── App root ── -->
<script type="text/babel">
const { motion: mA, useMotionValue: mvA, useSpring: spA } = window.Motion;
const { useState: usA, useEffect: ueA, useRef: urA } = React;

function CustomCursor({ mx, my }) {
  const x = spA(mx,{stiffness:250,damping:30,mass:0.4});
  const y = spA(my,{stiffness:250,damping:30,mass:0.4});
  return (
    <mA.div className="hidden md:block pointer-events-none fixed top-0 left-0 z-[80] mix-blend-multiply"
      style={{x,y,translateX:'-50%',translateY:'-50%'}}>
      <div className="h-6 w-6 rounded-full border border-ink-700/60 bg-white/30 backdrop-blur-sm" />
    </mA.div>
  );
}

function App() {
  const [phase,   setPhase]   = usA('idle');
  const [url,     setUrl]     = usA('');
  const [results, setResults] = usA(null);
  const cardRef = urA(null);

  const mx = mvA(0); const my = mvA(0);
  const cmx= mvA(0); const cmy= mvA(0);

  ueA(()=>{
    const onMove = (e) => {
      mx.set(e.clientX - window.innerWidth/2);
      my.set(e.clientY - window.innerHeight/2);
      cmx.set(e.clientX); cmy.set(e.clientY);
    };
    window.addEventListener('pointermove', onMove);
    return ()=>window.removeEventListener('pointermove', onMove);
  },[]);

  const jumpToCard = ()=>cardRef.current?.scrollIntoView({behavior:'smooth',block:'center'});

  return (
    <>
      <AnimatedBackdrop />
      <CustomCursor mx={cmx} my={cmy} />
      <TopNav />
      <main className="relative">
        <Hero onJump={jumpToCard} />
        <TranscriptCard phase={phase} setPhase={setPhase} url={url} setUrl={setUrl}
          results={results} setResults={setResults} anchorRef={cardRef} />
        <Ticker />
        <Features />
        <HowItWorks />
        <QuoteBand />
        <FinalCTA onJump={jumpToCard} />
        <Footer />
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
